<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - PHOTOLOGY Admin</title>
    <link rel="stylesheet" href="admin-style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    
    <!-- Firebase Config -->
    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCpqujJa_MlFmCAbeWCs-tuptuGNAq9JqM",
            authDomain: "agency-abe45.firebaseapp.com",
            databaseURL: "https://agency-abe45-default-rtdb.firebaseio.com",
            projectId: "agency-abe45",
            storageBucket: "agency-abe45.firebasestorage.app",
            messagingSenderId: "758327590163",
            appId: "1:758327590163:web:e19e4c5d57b258e32aaee6",
            measurementId: "G-ZKRJ2QM1CX"
        };
        
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        console.log('🔥 Firebase initialized in admin panel');
    </script>
</head>
<body>
    <div class="dashboard-wrapper">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1 class="sidebar-logo">PHOTOLOGY</h1>
                <p class="sidebar-subtitle">Admin Panel</p>
            </div>
            
            <nav>
                <ul class="sidebar-nav">
                    <li class="nav-item">
                        <a href="dashboard.html" class="nav-link">
                            <i class="fas fa-chart-line"></i>
                            <span>Dashboard</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="messages.html" class="nav-link active">
                            <i class="fas fa-envelope"></i>
                            <span>Messages</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="media-upload.html" class="nav-link">
                            <i class="fas fa-cloud-upload-alt"></i>
                            <span>Media Upload</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="pricing.html" class="nav-link">
                            <i class="fas fa-tag"></i>
                            <span>Pricing</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="settings.html" class="nav-link">
                            <i class="fas fa-cog"></i>
                            <span>Settings</span>
                        </a>
                    </li>
                </ul>
            </nav>
            
            <button class="logout-button" id="logoutBtn">
                <i class="fas fa-sign-out-alt"></i>
                <span>Logout</span>
            </button>
        </aside>
        
        <!-- Main Content -->
        <main class="main-content">
            <div class="content-header">
                <h1 class="page-title">Messages</h1>
                <p class="page-subtitle">Manage contact form submissions</p>
            </div>
            
            <!-- Messages Table -->
            <div class="content-section">
                <div class="glass-card" style="padding: 0; overflow: hidden;">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Phone</th>
                                <th>Message</th>
                                <th>Date</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="messagesTable">
                            <tr>
                                <td colspan="6" style="text-align: center; padding: 2rem;">
                                    <i class="fas fa-spinner fa-spin" style="font-size: 2rem; color: var(--gold);"></i>
                                    <p style="margin-top: 1rem; color: var(--text-secondary);">Loading messages...</p>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    
    <!-- View Message Modal -->
    <div class="modal" id="viewModal">
        <div class="modal-content glass-card">
            <div class="modal-header">
                <h2 class="modal-title">Message Details</h2>
                <button class="close-modal" onclick="closeModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <div id="messageDetails"></div>
            
            <div class="modal-actions">
                <button class="btn-secondary" onclick="closeModal()">Close</button>
            </div>
        </div>
    </div>
    
    <!-- Messages Script -->
    <script>
        let currentMessages = [];
        
        // Check authentication (localStorage based)
        const isLoggedIn = localStorage.getItem('photology_admin_logged_in');
        if (isLoggedIn !== 'true') {
            window.location.href = 'login.html';
        } else {
            loadMessages();
        }
        
        // Logout
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('photology_admin_logged_in');
            localStorage.removeItem('photology_admin_email');
            window.location.href = 'login.html';
        });
        
        // Load Messages
        async function loadMessages() {
            try {
                const messagesRef = database.ref('contacts');
                const snapshot = await messagesRef.once('value');
                const messages = snapshot.val();
                
                if (messages) {
                    currentMessages = Object.entries(messages).map(([id, data]) => ({
                        id,
                        ...data
                    })).reverse(); // Show newest first
                    
                    displayMessages(currentMessages);
                } else {
                    document.getElementById('messagesTable').innerHTML = `
                        <tr>
                            <td colspan="6" style="text-align: center; padding: 2rem; color: var(--text-secondary);">
                                No messages yet
                            </td>
                        </tr>
                    `;
                }
            } catch (error) {
                console.error('Error loading messages:', error);
                document.getElementById('messagesTable').innerHTML = `
                    <tr>
                        <td colspan="6" style="text-align: center; padding: 2rem; color: #ff4b4b;">
                            Error loading messages: ${error.message}
                        </td>
                    </tr>
                `;
            }
        }
        
        function displayMessages(messages) {
            const tableBody = document.getElementById('messagesTable');
            
            tableBody.innerHTML = messages.map(msg => `
                <tr>
                    <td style="font-weight: 600; color: var(--text-primary);">${msg.name || 'N/A'}</td>
                    <td>${msg.email || 'N/A'}</td>
                    <td style="color: var(--orange);">${msg.phone || 'N/A'}</td>
                    <td style="max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">
                        ${msg.message || 'N/A'}
                    </td>
                    <td>${msg.timestamp ? new Date(msg.timestamp).toLocaleString() : 'N/A'}</td>
                    <td>
                        <span style="padding: 0.25rem 0.75rem; background: ${msg.status === 'new' ? 'rgba(255, 140, 66, 0.15)' : 'rgba(75, 255, 75, 0.15)'}; color: ${msg.status === 'new' ? 'var(--orange)' : '#4bff4b'}; border-radius: 50px; font-size: 0.8rem; font-weight: 600;">
                            ${msg.status === 'new' ? 'New' : 'Read'}
                        </span>
                    </td>
                    <td>
                        <div class="action-buttons">
                            <button class="btn-edit" onclick="viewMessage('${msg.id}')">
                                <i class="fas fa-eye"></i> View
                            </button>
                            <button class="btn-delete" onclick="deleteMessage('${msg.id}')">
                                <i class="fas fa-trash"></i> Delete
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }
        
        async function viewMessage(id) {
            const message = currentMessages.find(m => m.id === id);
            if (!message) return;
            
            // Mark as read
            if (message.status === 'new') {
                try {
                    await database.ref(`contacts/${id}/status`).set('read');
                    message.status = 'read';
                    displayMessages(currentMessages);
                } catch (error) {
                    console.error('Error updating status:', error);
                }
            }
            
            document.getElementById('messageDetails').innerHTML = `
                <div style="margin-bottom: 1.5rem;">
                    <label style="display: block; color: var(--gold); font-weight: 600; margin-bottom: 0.5rem;">Name</label>
                    <p style="color: var(--text-primary); font-size: 1.1rem; font-weight: 600;">${message.name || 'N/A'}</p>
                </div>
                
                <div style="margin-bottom: 1.5rem;">
                    <label style="display: block; color: var(--gold); font-weight: 600; margin-bottom: 0.5rem;">Email</label>
                    <p style="color: var(--text-secondary);">
                        <a href="mailto:${message.email}" style="color: var(--orange); text-decoration: none;">
                            ${message.email || 'N/A'}
                        </a>
                    </p>
                </div>
                
                <div style="margin-bottom: 1.5rem;">
                    <label style="display: block; color: var(--gold); font-weight: 600; margin-bottom: 0.5rem;">Phone</label>
                    <p style="color: var(--text-secondary);">
                        <a href="tel:${message.phone}" style="color: var(--orange); text-decoration: none;">
                            ${message.phone || 'N/A'}
                        </a>
                    </p>
                </div>
                
                <div style="margin-bottom: 1.5rem;">
                    <label style="display: block; color: var(--gold); font-weight: 600; margin-bottom: 0.5rem;">Date</label>
                    <p style="color: var(--text-secondary);">${message.timestamp ? new Date(message.timestamp).toLocaleString() : 'N/A'}</p>
                </div>
                
                <div>
                    <label style="display: block; color: var(--gold); font-weight: 600; margin-bottom: 0.5rem;">Message</label>
                    <p style="color: var(--text-primary); line-height: 1.8; padding: 1rem; background: rgba(255, 255, 255, 0.03); border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.05);">
                        ${message.message || 'N/A'}
                    </p>
                </div>
            `;
            
            document.getElementById('viewModal').classList.add('active');
        }
        
        async function deleteMessage(id) {
            if (!confirm('Are you sure you want to delete this message?')) return;
            
            try {
                await database.ref(`contacts/${id}`).remove();
                currentMessages = currentMessages.filter(m => m.id !== id);
                displayMessages(currentMessages);
            } catch (error) {
                console.error('Error deleting message:', error);
                alert('Error deleting message: ' + error.message);
            }
        }
        
        function closeModal() {
            document.getElementById('viewModal').classList.remove('active');
        }
    </script>
</body>
</html>
